commands:
  install: echo "No install step needed for Rust workspace"
  check: cargo check --workspace
  build: cargo build --workspace
  test: cargo test --workspace -- --test-threads=4
  clippy: cargo clippy --workspace -- -D warnings
  fmt_check: cargo fmt --all -- --check
  wiring_guardrails: cargo test -p swell-integration-tests --test full_cycle_wiring
  check_core: cargo check -p swell-core
  check_daemon: cargo check -p swell-daemon
  check_orchestrator: cargo check -p swell-orchestrator
  test_core: cargo test -p swell-core
  test_daemon: cargo test -p swell-daemon
  test_orchestrator: cargo test -p swell-orchestrator
  test_integration: cargo test -p swell-integration-tests -- --test-threads=4

services: {}
