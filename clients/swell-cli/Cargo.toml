[package]
name = "swell-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "swell"
path = "src/main.rs"

[lib]
name = "swell_cli"
path = "src/lib.rs"

[dependencies]
swell-core = { path = "../../crates/swell-core" }
