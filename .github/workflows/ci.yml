name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # A-06 gate: Production binary must build without test-support feature.
  # This guarantees that OrchestratorBuilder and other test-only constructs
  # cannot leak into production binaries.
  build-no-default-features:
    name: Build without test-support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with --no-default-features
        run: cargo build --workspace --no-default-features --release
      - name: Verify OrchestratorBuilder is stripped from production build
        run: |
          set -euo pipefail
          cargo build --workspace --no-default-features --release \
            --message-format=json > /tmp/build.json
          if grep -q '"name":"OrchestratorBuilder"' /tmp/build.json; then
            echo "ERROR: OrchestratorBuilder leaked into --no-default-features build"
            exit 1
          fi
          echo "OK: OrchestratorBuilder stripped from production build"

  # A-07 gate: Block antipattern regressions in the orchestrator.
  # Each grep must return no matches — if any appear, the
  # constructor refactor antipatterns have been reintroduced.
  antipattern-gate:
    name: Antipattern regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check for forbidden antipatterns in swell-orchestrator
        run: |
          set -euo pipefail
          SRC=crates/swell-orchestrator/src
          fail=0
          check() {
            local pattern="$1"
            local desc="$2"
            if rg --no-messages "$pattern" "$SRC" > /dev/null; then
              echo "ANTIPATTERN FOUND ($desc): $pattern"
              rg -n "$pattern" "$SRC" || true
              fail=1
            fi
          }

          # Constructor refactor: no Option-wrapped subsystems
          check 'Arc<Mutex<Option<'                                'Option-wrapped subsystem (Mutex)'
          check 'Arc<RwLock<Option<'                               'Option-wrapped subsystem (RwLock)'
          check 'llm_backend: Option<'                             'Optional llm_backend'
          check 'execution_controller: Arc<RwLock<Option<'         'Optional execution_controller'
          check 'execution_controller\(\).*-> Option<'             'Optional accessor return'

          # Constructor refactor: no Default impls on required subsystems
          check 'impl Default for (ExecutionController|ValidationOrchestrator|WorktreePool|PostToolHookManager)' 'Default impl on required subsystem'

          # Constructor refactor: no with_* setters (use constructor injection)
          check 'fn with_(llm|checkpoint_manager)'                 'with_* setter'

          # e770933 floor: no unsafe escape hatches for the
          # Orchestrator ↔ ExecutionController cycle
          check '\*const Orchestrator'                             'raw pointer to Orchestrator'
          check 'unsafe impl (Sync|Send) for ExecutionController'  'unsafe Send/Sync on ExecutionController'
          check 'Arc::from_raw'                                    'Arc::from_raw (ownership reconstitution)'
          check 'std::ptr::null'                                   'std::ptr::null placeholder'

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "See docs: plan/structural-refactors/01_orchestrator_constructor/02_target_architecture.md"
            exit 1
          fi
          echo "OK: no antipatterns detected"

  # Standard test job
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets --features swell-orchestrator/test-support
      - name: cargo test (orchestrator execution suite)
        run: cargo test -p swell-orchestrator --lib --features test-support execution::
