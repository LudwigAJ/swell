name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # A-06 gate: Production binary must build without test-support feature.
  # This guarantees that OrchestratorBuilder and other test-only constructs
  # cannot leak into production binaries.
  build-no-default-features:
    name: Build without test-support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with --no-default-features
        run: cargo build --workspace --no-default-features --release
      - name: Verify swell-daemon does not enable swell-orchestrator/test-support in production deps
        # Source-level enforcement: if any production [dependencies] line on
        # `swell-orchestrator` enables `test-support`, the resolved dep graph
        # carries OrchestratorBuilder and Orchestrator::new_for_test() into
        # the daemon binary regardless of `--no-default-features`. Asserting
        # this against `cargo metadata` is the only check that closes the
        # loophole — symbol-name greps in cargo's build JSON do not, because
        # cargo only emits target/artifact names there, not exposed types.
        run: |
          set -euo pipefail
          cargo metadata --format-version=1 --no-deps \
            | jq -e '
                [ .packages[]
                  | select(.name == "swell-daemon")
                  | .dependencies[]
                  | select(.name == "swell-orchestrator" and (.kind == null))
                  | .features
                ]
                | all(. == [])
              ' > /dev/null
          echo "OK: swell-daemon production dep on swell-orchestrator has no extra features"

  # A-07 gate: Block antipattern regressions in the orchestrator.
  # Each grep must return no matches — if any appear, the
  # constructor refactor antipatterns have been reintroduced.
  antipattern-gate:
    name: Antipattern regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check for forbidden antipatterns in swell-orchestrator
        run: |
          set -euo pipefail
          SRC=crates/swell-orchestrator/src
          LIB=crates/swell-orchestrator/src/lib.rs
          fail=0
          check_path() {
            local pattern="$1"
            local desc="$2"
            local path="$3"
            if rg --no-messages "$pattern" "$path" > /dev/null; then
              echo "ANTIPATTERN FOUND ($desc): $pattern"
              rg -n "$pattern" "$path" || true
              fail=1
            fi
          }

          # Constructor-refactor shape rules apply to Orchestrator (lib.rs).
          # The cfg-gated test builder (builder.rs) is explicitly allowed to
          # use Option<_> + with_* setters for fake injection in tests.
          # Agent constructors in agents.rs have unrelated with_llm methods.
          check_path 'Arc<Mutex<Option<(ExecutionController|ValidationOrchestrator|WorktreePool|PostToolHookManager|LlmBackend|CheckpointManager|FileLockManager|McpConfigManager)' \
                     'Option-wrapped subsystem (Mutex) on Orchestrator' "$LIB"
          check_path 'Arc<RwLock<Option<(ExecutionController|ValidationOrchestrator|WorktreePool|PostToolHookManager|LlmBackend|CheckpointManager|FileLockManager|McpConfigManager)' \
                     'Option-wrapped subsystem (RwLock) on Orchestrator' "$LIB"
          check_path 'llm_backend: Option<'                         'Optional llm_backend on Orchestrator' "$LIB"
          check_path 'execution_controller: Arc<RwLock<Option<'     'Optional execution_controller on Orchestrator' "$LIB"
          check_path 'execution_controller\(\).*-> Option<'         'Optional execution_controller() accessor' "$LIB"

          # No Default impls on required subsystems (whole crate).
          check_path 'impl Default for (ExecutionController|ValidationOrchestrator|WorktreePool|PostToolHookManager)' \
                     'Default impl on required subsystem' "$SRC"

          # No with_* setters on Orchestrator itself — only on the cfg-gated
          # OrchestratorBuilder. Agent types may keep their with_llm methods.
          # Uses multiline so the `impl Orchestrator {` block boundary is respected.
          check_path '(?s)impl Orchestrator \{[^}]*fn with_(llm|checkpoint_manager)' \
                     'with_* setter on Orchestrator' "$LIB"

          # e770933 floor: no unsafe escape hatches for the
          # Orchestrator ↔ ExecutionController cycle (whole crate).
          check_path '\*const Orchestrator'                         'raw pointer to Orchestrator' "$SRC"
          check_path 'unsafe impl (Sync|Send) for ExecutionController' \
                     'unsafe Send/Sync on ExecutionController' "$SRC"
          check_path 'Arc::from_raw'                                'Arc::from_raw (ownership reconstitution)' "$SRC"
          check_path 'std::ptr::null'                               'std::ptr::null placeholder' "$SRC"

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "See docs: plan/structural-refactors/01_orchestrator_constructor/02_target_architecture.md"
            exit 1
          fi
          echo "OK: no antipatterns detected"

  # Standard test job
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets --features swell-orchestrator/test-support
      - name: cargo test (orchestrator execution suite)
        run: cargo test -p swell-orchestrator --lib --features test-support execution::
